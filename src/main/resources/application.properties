spring.application.name=deliveryapp
server.port=8080

# ============================================
# PRODUCTION ROUTING (CRITICAL FOR NGINX/HTTPS)
# ============================================
# Ensures UrlUtil generates "https://allin-shops.com/uploads/..." 
server.forward-headers-strategy=framework

# ============================================
# POSTGRESQL DATABASE
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_db
spring.datasource.username=postgres
spring.datasource.password=4581
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Tuning
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# ============================================
# JPA / HIBERNATE 
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Turned off for production to save Disk I/O and CPU
spring.jpa.show-sql=false 
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# ============================================
# TOMCAT PERFORMANCE TUNING
# ============================================
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-swallow-size=52428800
server.tomcat.threads.max=200
server.tomcat.connection-timeout=20000
server.tomcat.max-part-count=50

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR

# ============================================
# SWAGGER & ACTUATOR
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always